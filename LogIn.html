<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project</title>
    <link rel="stylesheet" href="./LogIn.css" />
  </head>
  <body>
    <div class="container">
      <img
        src="https://images.unsplash.com/photo-1631599143419-ea8539ed4fbd?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx1bml2ZXJzaXR5JTIwY2FtcHVzJTIwYnVpbGRpbmd8ZW58MXx8fHwxNzcxNzM2NDE5fDA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral"
        alt="Cairo University"
      />
      <div class="card">
        <h1>Login To Unishare</h1>

        <form>
          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" />
          </div>

          <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="links">
          <a href="#">Forgot Password?</a>
          <a href="#">Create an Account</a>
        </div>
      </div>
    </div>
  </body>
</html>
