<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumpus Market</title>
    <link rel="stylesheet" href="./Rigister.css">
</head>
<body>
<div class="form-container">
    <h2>Campus Market and Volunteer</h2>
    <form id="rigesterForm">
    
        <input placeholder="Full Name" type="text" required>
        <br>
        <input placeholder="Email address" type="email" required>
        <br>
        <input placeholder="Password" type="password" required>
        <br>
        <input placeholder="Confirm Password" type="password" required>
        <br>
        <label for="Choose Your Seller or Buyer"></label>
        <select name="role" id="mainRole" required>
        <option value="Choose"></option>
            <option value="seller">Seller</option>
            <option value="buyer">Buyer</option>
        </select>
        <br>
        <br>
        <div id="sellerOption" class="hidden">
        <label for="Choose Your Normal or Volunteer"></label>
         <select name="sellerRole" id="sellerRole" required>
        <option value="Choose"></option>
            <option value="normal">Normal Seller</option>
            <option value="volunteer">Volunteer</option>
         </select>
        </div>
         <br>
         <div id="buyerOption" class="hidden">
        <label for="Choose Your Normal or inNeed"></label>
         <select id="buyerType" required>
        <option value="Choose"></option>
            <option value="no">Normal</option>
            <option value="yes">inNeed</option>
         </select>
        </div>
         <br>
<button type="submit">Register</button>
        
</form>
</div>
    <script type="module" src="./Rigister.js"></script>
</body>
</html>
